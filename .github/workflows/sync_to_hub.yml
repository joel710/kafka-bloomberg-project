name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # Permet de lancer la synchronisation manuellement depuis l'onglet Actions
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://joel710:$HF_TOKEN@huggingface.co/spaces/joel710/kafka-bloomberg-project main
