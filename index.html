<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Sentinel | Intelligence Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #007AFF;
            --accent-gold: #FFD700;
            --accent-green: #34C759;
            --accent-red: #FF3B30;
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1b, #000000);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Mesh Gradient Background Elements */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
            filter: blur(80px);
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 1s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            animation: fadeInUp 1s ease-out;
        }

        /* Glass Card Style */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .market-grid {
            display: grid;
            gap: 20px;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            transition: transform 0.3s ease;
        }

        .price-item:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.05);
        }

        .price-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .price-label img {
            width: 24px;
            height: 24px;
        }

        .price-value {
            font-size: 1.5rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .news-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .intelligence-panel {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(0, 122, 255, 0.2);
            padding: 25px;
        }

        .prediction-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--accent-blue);
        }

        .impact-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 8px;
        }

        .bullish { background: rgba(52, 199, 89, 0.2); color: var(--accent-green); }
        .bearish { background: rgba(255, 59, 48, 0.2); color: var(--accent-red); }
        .neutral { background: rgba(255, 255, 255, 0.1); color: var(--text-dim); }

        .news-feed {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 10px;
        }

        .news-feed::-webkit-scrollbar { width: 4px; }
        .news-feed::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .news-card {
            padding: 15px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            animation: slideInLeft 0.5s ease-out;
        }

        .news-card h4 {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .news-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .price-up { color: var(--accent-green); transition: color 0.3s; }
        .price-down { color: var(--accent-red); transition: color 0.3s; }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="header">
        <p><span class="live-indicator"></span> Real-Time Network Status: Connected</p>
        <h1>Global Market Intelligence</h1>
    </div>

    <div class="dashboard">
        <!-- Section Gauche : Marché -->
        <div class="market-section">
            <div class="glass-card market-grid">
                <h3 style="margin-bottom: 10px;">Live Assets</h3>
                
                <div class="price-item" id="card-XAU">
                    <div class="price-label">
                        <span style="font-size: 1.5rem;">💰</span>
                        <div>
                            <div style="font-weight: 600;">Gold Spot</div>
                            <div class="news-meta">XAU / USD</div>
                        </div>
                    </div>
                    <div class="price-value" id="price-XAU">0.00</div>
                </div>

                <div class="price-item" id="card-EUR">
                    <div class="price-label">
                        <span style="font-size: 1.5rem;">💶</span>
                        <div>
                            <div style="font-weight: 600;">Euro / USD</div>
                            <div class="news-meta">EUR / USD</div>
                        </div>
                    </div>
                    <div class="price-value" id="price-EUR">0.0000</div>
                </div>
            </div>
        </div>

        <!-- Section Droite : Intelligence -->
        <div class="news-section">
            <div class="glass-card intelligence-panel" id="intel-panel">
                <h3 style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                    <span>🧠</span> AI Intelligence Report
                </h3>
                <div id="intel-content">
                    <p style="color: var(--text-dim);">Waiting for the next global event analysis...</p>
                </div>
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 15px;">Global Feed</h3>
                <div class="news-feed" id="news-feed">
                    <!-- Les news arriveront ici -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = window.location.hostname || '127.0.0.1';
        const socket = new WebSocket(`${wsProtocol}//${wsHost}:8000/ws`);
        
        console.log("Tentative de connexion WebSocket sur :", socket.url);
        
        let lastPrices = { 'XAU/USD': 0, 'EUR/USD': 0 };

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.topic === 'market-data') {
                updatePrice(data.asset, data.price);
            } else if (data.topic === 'analyzed-news') {
                updateIntelligence(data);
                addNewsFeed(data);
            }
        };

        function updatePrice(asset, price) {
            const symbol = asset === 'XAU/USD' ? 'XAU' : 'EUR';
            const el = document.getElementById(`price-${symbol}`);
            if (!el) return;

            // Animation de couleur pour le changement de prix
            if (price > lastPrices[asset]) {
                el.classList.add('price-up');
                setTimeout(() => el.classList.remove('price-up'), 1000);
            } else if (price < lastPrices[asset]) {
                el.classList.add('price-down');
                setTimeout(() => el.classList.remove('price-down'), 1000);
            }

            el.innerText = price.toFixed(symbol === 'XAU' ? 2 : 4);
            lastPrices[asset] = price;
        }

        function updateIntelligence(data) {
            const container = document.getElementById('intel-content');
            
            const impactGoldClass = data.impact_gold.toLowerCase();
            const impactEurClass = data.impact_eur.toLowerCase();

            container.innerHTML = `
                <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 10px;">${data.headline}</div>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <span class="impact-badge ${impactGoldClass}">Gold: ${data.impact_gold}</span>
                    <span class="impact-badge ${impactEurClass}">Euro: ${data.impact_eur}</span>
                </div>
                <div class="prediction-box">
                    <div style="font-size: 0.75rem; text-transform: uppercase; color: var(--accent-blue); margin-bottom: 5px; font-weight: 700;">AI Forecast</div>
                    <div style="font-size: 0.95rem;">${data.forecast}</div>
                    <div style="font-size: 0.8rem; color: var(--text-dim); margin-top: 8px;">Reason: ${data.reason}</div>
                </div>
            `;
        }

        function addNewsFeed(data) {
            const feed = document.getElementById('news-feed');
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
                <h4>${data.headline}</h4>
                <div class="news-meta">${data.source.toUpperCase()} • ${new Date().toLocaleTimeString()}</div>
            `;
            feed.prepend(card);
            
            // Garder seulement les 10 dernières news
            if (feed.children.length > 10) {
                feed.removeChild(feed.lastChild);
            }
        }

        socket.onopen = () => console.log('WebSocket Connected');
        socket.onclose = () => console.log('WebSocket Disconnected');
    </script>
</body>
</html>
