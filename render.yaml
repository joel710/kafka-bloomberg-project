services:
  - type: web
    name: kafka-bloomberg-sentinel
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 8000
      - key: GOOGLE_API_KEY
        sync: false # À mettre dans le dashboard Render
      - key: MONGO_URI
        sync: false # À mettre dans le dashboard Render
